name: Workshop registration
description: Request access to the workshop GitHub organization.
title: "Workshop access request"
labels:
  - workshop-registration
body:
  - type: markdown
    attributes:
      value: |
        This public issue requests workshop organization access for the GitHub account that opens the issue.

        The workshop secret word field below will be visible in this public issue. Enter only the workshop secret word shared by the organizers. Do not enter passwords, personal access tokens, or private credentials.
  - type: input
    id: workshop_secret_word
    attributes:
      label: Workshop secret word
      description: This value is visible in the public issue. Enter only the workshop secret word shared by the organizers.
      placeholder: Enter the workshop secret word
    validations:
      required: true
  - type: checkboxes
    id: account_confirmation
    attributes:
      label: Account confirmation
      options:
        - label: I am opening this issue with the GitHub account that should be invited.
          required: true
